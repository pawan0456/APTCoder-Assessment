apiVersion: v1
kind: Namespace
metadata:
  name: edtech-app

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: edtech-app
data:
  PYTHONUNBUFFERED: "1"
  DATABASE_PATH: "/app/data/edtech.db"

---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: edtech-pv
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: "/data/edtech"

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: edtech-pvc
  namespace: edtech-app
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: edtech-nlp-api
  namespace: edtech-app
  labels:
    app: edtech-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: edtech-api
  template:
    metadata:
      labels:
        app: edtech-api
    spec:
      containers:
      - name: api
        image: edtech-nlp-api:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        
        # Environment variables
        envFrom:
        - configMapRef:
            name: app-config
        
        # Resource limits
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        
        # Liveness probe
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        
        # Readiness probe
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 2
        
        # Volume mounts
        volumeMounts:
        - name: data
          mountPath: /app/data
        
        # Security context
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          runAsNonRoot: false
      
      # Volumes
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: edtech-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: edtech-api-service
  namespace: edtech-app
  labels:
    app: edtech-api
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: 8000
    protocol: TCP
  selector:
    app: edtech-api

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: edtech-hpa
  namespace: edtech-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: edtech-nlp-api
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: edtech-pdb
  namespace: edtech-app
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: edtech-api
