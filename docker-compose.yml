version: '3.8'

services:
  edtech-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_PATH=/app/data/edtech.db
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - edtech-network

networks:
  edtech-network:
    driver: bridge

volumes:
  data:
    driver: local
